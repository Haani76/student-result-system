<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subjects — Student Result System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <h1>Student Result System</h1>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="marks.html">Enter Marks</a>
    <a href="results.html">Results</a>
    <a class="logout-btn" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="container">

  <div class="card">
    <h2>Add New Subject</h2>
    <div id="subject-alert" class="alert"></div>
    <form onsubmit="addSubject(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Subject Name</label>
          <input type="text" id="sub-name" placeholder="e.g. Mathematics" required/>
        </div>
        <div class="form-group">
          <label>Total Marks</label>
          <input type="number" id="sub-total" placeholder="100" value="100" min="1" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-success">Add Subject</button>
    </form>
  </div>

  <div class="card">
    <h2>All Subjects</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Subject Name</th>
            <th>Total Marks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="subjects-table">
          <tr><td colspan="4" style="text-align:center;color:#999">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script>
  requireAuth();

  async function loadSubjects() {
    const tbody = document.getElementById("subjects-table");
    try {
      const subjects = await apiCall("GET", "/subjects/");
      if (subjects.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#999">No subjects yet.</td></tr>`;
        return;
      }
      tbody.innerHTML = subjects.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${s.name}</td>
          <td>${s.total_marks}</td>
          <td>
            <button onclick="deleteSubject(${s.id})" class="btn btn-danger" style="padding:5px 12px;font-size:0.82rem">Delete</button>
          </td>
        </tr>
      `).join("");
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:red;text-align:center">${err.message}</td></tr>`;
    }
  }

  async function addSubject(e) {
    e.preventDefault();
    try {
      await apiCall("POST", "/subjects/", {
        name: document.getElementById("sub-name").value,
        total_marks: parseInt(document.getElementById("sub-total").value),
      });
      showAlert("subject-alert", "Subject added successfully!", "success");
      e.target.reset();
      document.getElementById("sub-total").value = "100";
      loadSubjects();
    } catch (err) {
      showAlert("subject-alert", err.message, "error");
    }
  }

  async function deleteSubject(id) {
    if (!confirm("Delete this subject?")) return;
    try {
      await apiCall("DELETE", `/subjects/${id}`);
      loadSubjects();
    } catch (err) {
      alert(err.message);
    }
  }

  loadSubjects();
</script>
</body>
</html>
