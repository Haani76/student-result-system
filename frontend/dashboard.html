<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Student Result System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <h1>Student Result System</h1>
  <div>
    <a href="students.html">Students</a>
    <a href="subjects.html">Subjects</a>
    <a href="marks.html">Enter Marks</a>
    <a href="results.html">Results</a>
    <a class="logout-btn" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="container">
  <div id="welcome-card" class="card">
    <h2 id="school-name">Welcome!</h2>
    <p style="color:#666;font-size:0.95rem;">Here is a summary of your school's data.</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="total-students">—</div>
      <div class="label">Total Students</div>
    </div>
    <div class="stat-card" style="border-color:#27ae60">
      <div class="number" id="total-subjects">—</div>
      <div class="label">Subjects</div>
    </div>
    <div class="stat-card" style="border-color:#e67e22">
      <div class="number" id="total-marks">—</div>
      <div class="label">Marks Entered</div>
    </div>
  </div>

  <div class="card">
    <h2>Quick Actions</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <a href="students.html" class="btn btn-primary">+ Add Student</a>
      <a href="subjects.html" class="btn btn-success">+ Add Subject</a>
      <a href="marks.html" class="btn" style="background:#e67e22;color:white">Enter Marks</a>
      <a href="results.html" class="btn" style="background:#8e44ad;color:white">View Results</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();

  async function loadDashboard() {
    try {
      const me = await apiCall("GET", "/auth/me");
      document.getElementById("school-name").textContent = `Welcome, ${me.name}`;

      const [students, subjects] = await Promise.all([
        apiCall("GET", "/students/"),
        apiCall("GET", "/subjects/"),
      ]);

      document.getElementById("total-students").textContent = students.length;
      document.getElementById("total-subjects").textContent = subjects.length;

      let markCount = 0;
      for (const s of students) {
        const marks = await apiCall("GET", `/marks/student/${s.id}`);
        markCount += marks.length;
      }
      document.getElementById("total-marks").textContent = markCount;
    } catch (err) {
      console.error(err);
    }
  }

  loadDashboard();
</script>
</body>
</html>
